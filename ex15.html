<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ex 15 — Lançamento</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<nav aria-label="Navegação do exercício">
  <a href="index.html">← Voltar à lista</a>
</nav>
<main>
  <section id="ex15">
    <h2>Lançamento em Breve</h2>
    <p>Contagem regressiva para o novo produto:</p>
    <div class="contagem">
      <div class="bloco"><time datetime="P15D">15</time><small>dias</small></div>
      <div class="bloco"><time datetime="PT8H">08</time><small>horas</small></div>
      <div class="bloco"><time datetime="PT42M">42</time><small>min</small></div>
      <div class="bloco"><time datetime="PT30S">30</time><small>seg</small></div>
    </div>
    <form action="#">
      <label for="email-lancamento" class="presale">Cadastre seu e-mail para ser avisado:</label>
      <input type="email" id="email-lancamento" name="email" placeholder="seu@email.com" required>
      <button type="submit">Avisar-me</button>
    </form>
  </section>
</main>
</body>
</html>
