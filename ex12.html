<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ex 12 — Galeria</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<nav aria-label="Navegação do exercício">
  <a href="index.html">← Voltar à lista</a>
</nav>
<main>
  <section id="ex12">
    <h2>Galeria de Fotos</h2>
    <div class="galeria">
      <figure>
        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 140 100'%3E%3Crect width='140' height='100' fill='%231a237e'/%3E%3Ccircle cx='70' cy='50' r='28' fill='%23ffd740'/%3E%3C/svg%3E" alt="Ilustração de um Pôr do sol">
        <figcaption>Pôr do sol</figcaption>
      </figure>
      <figure>
        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 140 100'%3E%3Crect width='140' height='100' fill='%2300695c'/%3E%3Crect x='34' y='24' width='72' height='52' rx='4' fill='%2380cbc4'/%3E%3C/svg%3E" alt="Ilustração de uma Floresta">
        <figcaption>Floresta</figcaption>
      </figure>
      <figure>
        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 140 100'%3E%3Crect width='140' height='100' fill='%23880e4f'/%3E%3Cpolygon points='70,14 120,86 20,86' fill='%23f48fb1'/%3E%3C/svg%3E" alt="Ilustração de Montanhas">
        <figcaption>Montanhas</figcaption>
      </figure>
      <figure>
        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 140 100'%3E%3Crect width='140' height='100' fill='%230d47a1'/%3E%3Crect x='0' y='60' width='140' height='40' fill='%2342a5f5'/%3E%3Ccircle cx='70' cy='36' r='20' fill='%23e3f2fd' opacity='.6'/%3E%3C/svg%3E" alt="Ilustração do Mar">
        <figcaption>Mar</figcaption>
      </figure>
    </div>
  </section>
</main>
</body>
</html>
